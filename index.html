<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Educacional</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css/estilo.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>emailjs.init("7YQE2NjP-M4abGZkv");</script>
</head>
<body>

    <header>
        <div class="logo-box"></div>
        <h1>Nome do Site</h1>
    </header>

    <div class="container">
        <aside>
            <h2>Menu</h2>
            <nav>
                <ul>
                    <li><a href="#" id="btn-home">Home</a></li>
                    <li><a href="#" id="btn-compliance">Compliance AI</a></li>
                    <li><a href="#" id="btn-login">Login/Cadastro</a></li>
                </ul>
            </nav>
        </aside>
        <main id="conteudo-principal"></main>
    </div>

    <footer><p>&copy; 2026 Portal Educacional. Todos os direitos reservados.</p></footer>

    <!-- ==========================================
         TEMPLATES (ESTRUTURA DAS TELAS)
         ========================================== -->

    <template id="tpl-home">
        <div class="fade-in">
            <h2>Bem-vindo ao Portal</h2>
            <p>Selecione uma opção no menu lateral para começar.</p>
        </div>
    </template>

    <template id="tpl-login">
        <div class="login-card fade-in">
            <h2>Acessar Portal</h2>
            <form id="form-login">
                <div class="form-group"><label>E-mail:</label><input type="email" id="l-email" required></div>
                <div class="form-group"><label>Senha:</label><input type="password" id="l-senha" required></div>
                <button type="submit" class="btn-enviar">Entrar</button>
            </form>
            <p class="trocar-form">
                <a href="#" id="link-cadastrar">Criar Conta</a> | <a href="#" id="link-recuperar">Esqueci a senha</a>
            </p>
        </div>
    </template>

    <template id="tpl-cadastro">
        <div class="login-card fade-in">
            <h2>Novo Cadastro</h2>
            <form id="form-cadastro">
                <div class="form-group"><label>Nome Completo:</label><input type="text" id="c-nome" required></div>
                <div class="form-group"><label>E-mail:</label><input type="email" id="c-email" required></div>
                <div class="form-group"><label>Senha:</label><input type="password" id="c-senha" required></div>
                <div class="form-group">
                    <label>Perfil:</label>
                    <select id="tipo-usuario">
                        <option value="aluno">Aluno</option>
                        <option value="professor">Professor (@ifpr.edu.br)</option>
                    </select>
                </div>
                <button type="submit" class="btn-enviar">Solicitar Ativação</button>
            </form>
            <p class="trocar-form"><a href="#" id="link-v-login">Já tenho conta</a></p>
        </div>
    </template>

    <template id="tpl-pin">
        <div class="login-card fade-in">
            <h2>Validar PIN</h2>
            <p id="msg-pin" style="text-align:center;"></p>
            <input type="text" id="input-pin" maxlength="6" style="text-align:center; font-size:2rem; width:100%; margin:20px 0; letter-spacing:8px;">
            <button id="btn-v-pin" class="btn-enviar">Ativar</button>
        </div>
    </template>

    
    <template id="tpl-dash-professor">
        <div class="dashboard fade-in">
            <div class="dash-header">
                <h2 id="txt-n-prof"></h2>
                <div class="dash-nav-btns">
                    <button id="btn-n-turma" class="btn-acao">+ Nova Turma</button>
                    <button id="btn-logout" class="btn-logout">Sair</button>
                </div>
            </div>
            <div id="lista-turmas" class="grid-cards"></div>
        </div>
    </template>

    <template id="tpl-dash-aluno">
        <div class="dashboard fade-in">
            <div class="dash-header">
                <h2 id="txt-n-aluno"></h2>
                <div class="dash-nav-btns">
                    <button id="btn-e-turma" class="btn-acao" style="background:#2980b9;">+ Entrar em Turma</button>
                    <button id="btn-l-aluno" class="btn-logout">Sair</button>
                </div>
            </div>
            <div id="lista-turmas-aluno" class="grid-cards"></div>
        </div>
    </template>

    <template id="tpl-gestao-turma">
        <div class="dashboard fade-in" style="max-width: 1200px;">
            <button id="btn-v-prof" class="btn-voltar">⬅ Voltar</button>
            <div class="dash-header">
                <h2 id="txt-g-nome"></h2>
                <button id="btn-add-c" class="btn-acao">+ Novo Conteúdo</button>
            </div>
            <div class="gestao-container">
                <section class="card-gestao"><h3>👥 Alunos</h3><div id="res-alunos" class="lista-simples"></div></section>
                <section class="card-gestao">
                    <h3>📅 Cronograma <button id="btn-agendar" class="btn-acao-micro">+ Agendar</button></h3>
                    <div id="res-cronograma" class="lista-simples"></div>
                </section>
                <section class="card-gestao"><h3>📝 Atividades</h3><div id="res-atividades" class="lista-simples"></div></section>
                <section class="card-gestao"><h3>📚 Materiais</h3><div id="res-materiais" class="lista-simples"></div></section>
            </div>
        </div>
    </template>

    <template id="tpl-materiais-aluno">
        <div class="dashboard fade-in">
            <button id="btn-v-est" class="btn-voltar">⬅ Voltar</button>
            <h2 id="txt-m-nome"></h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
                <section class="card-gestao"><h3>📅 Agendado pelo Prof.</h3><div id="l-ag-prof" class="lista-simples"></div></section>
                <section class="card-gestao"><h3>📚 Conteúdos</h3><div id="l-mt-prof" class="lista-simples"></div></section>
            </div>
        </div>
    </template>


    <!-- MODAIS -->
    <template id="tpl-modal-criar-turma">
        <div class="modal-overlay">
            <div class="login-card fade-in" style="max-width: 500px;">
                <h3>Criar Nova Turma</h3>
                <form id="form-criar-turma">
                    <div class="form-group"><label>Nome da Turma:</label><input type="text" id="turma-nome" required></div>
                    <div class="form-group"><label>Disciplina:</label><input type="text" id="turma-disciplina" required></div>
                    <div class="form-group"><label>Ano Letivo:</label><input type="text" id="turma-ano" required></div>
                    <div class="form-group"><label>Co-professores:</label><input type="text" id="turma-coprofs"></div>
                    <div class="form-group"><label>Descrição:</label><textarea id="turma-desc" rows="3"></textarea></div>
                    <button type="submit" class="btn-enviar">Gravar</button>
                    <button type="button" id="btn-cancelar-turma" class="btn-cancelar">Cancelar</button>
                </form>
            </div>
        </div>
    </template>

    <template id="tpl-modal-conteudo">
        <div class="modal-overlay">
            <div class="login-card fade-in">
                <h3 id="mod-c-titulo">Novo Conteúdo</h3>
                <form id="form-c">
                    <div class="form-group"><label>Título:</label><input type="text" id="at-t" required></div>
                    <div class="form-group"><label>Tipo:</label><select id="at-tp"><option value="link">PDF/Link</option><option value="video">Vídeo</option><option value="tarefa">Tarefa</option></select></div>
                    <div class="form-group"><label>URL:</label><input type="url" id="at-u"></div>
                    <div class="form-group"><label>Prazo Cronograma:</label><input type="date" id="at-d"></div>
                    <button type="submit" class="btn-enviar">Salvar</button>
                    <button type="button" id="btn-f-modal" class="btn-cancelar">Fechar</button>
                </form>
            </div>
        </div>
    </template>

    <template id="tpl-modal-agendar">
        <div class="modal-overlay">
            <div class="login-card fade-in">
                <h3>Agendar para Aluno</h3>
                <form id="form-ag">
                    <div class="form-group"><label>Título:</label><input type="text" id="ag-t" required></div>
                    <div class="form-group"><label>Data:</label><input type="date" id="ag-d" required></div>
                    <div class="form-row" style="display:flex; gap:10px;"><input type="time" id="ag-h1" required> às <input type="time" id="ag-h2" required></div>
                    <div class="form-group"><label>Para:</label><select id="ag-sel-aluno"><option value="geral">Toda a Turma</option></select></div>
                    <button type="submit" class="btn-enviar">Agendar</button>
                    <button type="button" id="btn-f-agenda" class="btn-cancelar">Cancelar</button>
                </form>
            </div>
        </div>
    </template>


    <!-- Tela para digitar o e-mail de recuperação -->
<template id="tpl-recuperar-senha">
    <div class="login-card fade-in">
        <h2>Recuperar Senha</h2>
        <p style="text-align:center; font-size: 0.9rem; margin-bottom: 15px;">
            Enviaremos um código para o seu e-mail.
        </p>
        <form id="form-recuperar-solicitar">
            <div class="form-group">
                <label>Seu E-mail cadastrado:</label>
                <input type="email" id="r-email" required>
            </div>
            <button type="submit" class="btn-enviar">Enviar Código</button>
        </form>
        <p class="trocar-form"><a href="#" id="link-v-login-rec">Voltar ao Login</a></p>
    </div>
</template>

<!-- Tela para digitar o PIN e a NOVA senha -->
<template id="tpl-nova-senha">
    <div class="login-card fade-in">
        <h2>Nova Senha</h2>
        <p id="msg-pin-rec" style="text-align:center; font-size: 0.8rem;"></p>
        <form id="form-atualizar-senha">
            <div class="form-group">
                <label>PIN de 6 dígitos:</label>
                <input type="text" id="r-pin" maxlength="6" style="text-align:center; font-size: 1.5rem;" required>
            </div>
            <div class="form-group">
                <label>Nova Senha:</label>
                <input type="password" id="r-nova-senha" required>
            </div>
            <button type="submit" class="btn-enviar">Redefinir Senha</button>
        </form>
    </div>
</template>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/SupaBaseClientes.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
